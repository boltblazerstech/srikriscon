steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_RAZORPAY_KEY_ID=${_NEXT_PUBLIC_RAZORPAY_KEY_ID}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/srikriscon-fe'
      - '.'
images:
  - 'gcr.io/$PROJECT_ID/srikriscon-fe'
