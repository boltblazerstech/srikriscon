<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Kriscon API Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F5F7F7;
            color: #0B3A42;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(11, 58, 66, 0.08);
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }
        p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 0;
        }
        .badge {
            display: inline-block;
            background-color: rgba(11, 58, 66, 0.1);
            color: #0B3A42;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Active</div>
        <h1>Sri Kriscon API</h1>
        <p>The ecommerce REST API server is up and running successfully.</p>
    </div>
</body>
</html>
