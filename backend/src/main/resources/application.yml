spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce}?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  error:
    include-message: never
    include-binding-errors: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2} # Base64-encoded 256-bit key — falls back to secure default
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}     # 15 min
  admin-access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:86400000} # 1 day
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7 days

# ─── Cloudflare R2 (S3-compatible object storage) ────────────────────────────
cloudflare:
  r2:
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:}
    endpoint: ${R2_ENDPOINT:}         # https://<account-id>.r2.cloudflarestorage.com
    public-url: ${R2_PUBLIC_URL:}     # https://pub-<hash>.r2.dev  (or custom domain)
    region: auto                      # R2 uses "auto"

# ─── Razorpay ─────────────────────────────────────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  currency: ${RAZORPAY_CURRENCY:INR}

# ─── Shiprocket ───────────────────────────────────────────────────────────────
shiprocket:
  email: ${SHIPROCKET_EMAIL:}
  password: ${SHIPROCKET_PASSWORD:}
  base-url: ${SHIPROCKET_BASE_URL:https://apiv2.shiprocket.in/v1/external}
  token-refresh-interval-hours: ${SHIPROCKET_TOKEN_REFRESH_HOURS:9}  # token valid for ~10 h

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# ─── Email defaults ───────────────────────────────────────────────────────────
email:
  from: ${EMAIL_FROM:noreply@example.com}
  from-name: ${EMAIL_FROM_NAME:Ecommerce Store}

# ─── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# ─── App URLs (used in email links) ──────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-url: ${ADMIN_URL:http://localhost:3001}
  reset-token-expiry-mins: ${RESET_TOKEN_EXPIRY_MINS:30}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: ${LOG_SQL:OFF}
