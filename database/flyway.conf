# Flyway standalone configuration
# Used when running Flyway CLI directly against the database.
# Override via environment variables or -X flags.

flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
flyway.user=${DB_USERNAME:postgres}
flyway.password=${DB_PASSWORD:postgres}
flyway.locations=filesystem:./migrations
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
