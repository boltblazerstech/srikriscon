steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/srikriscon-admin'
      - '.'
images:
  - 'gcr.io/$PROJECT_ID/srikriscon-admin'

substitutions:
  _NEXT_PUBLIC_API_URL: ''
