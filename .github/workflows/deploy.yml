name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'storefront/**'
      - 'backend/**'
      - 'admin/**'

jobs:

  # ─────────────────────────────────────
  # Deploy Storefront → srikriscon-fe
  # ─────────────────────────────────────
  deploy-storefront:
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'storefront/') ||
      contains(toJson(github.event.commits.*.added), 'storefront/')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Storefront Image
        run: |
          gcloud builds submit ./storefront \
            --tag=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-fe

      - name: Deploy Storefront to Cloud Run
        run: |
          gcloud run deploy srikriscon-fe \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-fe \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated

  # ─────────────────────────────────────
  # Deploy Backend → srikriscon-be
  # ─────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'backend/') ||
      contains(toJson(github.event.commits.*.added), 'backend/')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Backend Image
        run: |
          gcloud builds submit ./backend \
            --tag=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-be

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy srikriscon-be \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-be \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated

  # ─────────────────────────────────────
  # Deploy Admin → srikriscon-admin
  # ─────────────────────────────────────
  deploy-admin:
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'admin/') ||
      contains(toJson(github.event.commits.*.added), 'admin/')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Admin Image
        run: |
          gcloud builds submit ./admin \
            --tag=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-admin

      - name: Deploy Admin to Cloud Run
        run: |
          gcloud run deploy srikriscon-admin \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/srikriscon-admin \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated
